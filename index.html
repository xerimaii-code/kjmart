<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kjmart</title>
    <link rel="manifest" href="/metadata.json">
    <meta name="theme-color" content="#f8fafc">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --surface-secondary-rgb: 248 250 252;
            --header-height: calc(3.5rem + env(safe-area-inset-top));
        }
        
        /* 기본 배경 설정 */
        html, body, #root { 
            height: 100%; 
            overflow: hidden; 
            background-color: rgb(var(--surface-secondary-rgb));
        }
        
        /* [중요] 안드로이드 앱에서 카메라 실행 시 배경을 투명하게 만듦 */
        body.scanner-active { 
            background: transparent !important;
            background-color: transparent !important;
        }
        
        /* 앱의 메인 UI만 보이지 않게 하고 모달 UI는 보이도록 함 */
        body.scanner-active #root { 
            background-color: transparent !important;
            opacity: 0; 
            visibility: hidden; 
            pointer-events: none;
        }

        .text-shadow { text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-down { animation: fadeInDown 0.4s ease forwards; }
    </style>
    <link rel="stylesheet" href="/index.css">
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react/": "https://esm.sh/react@^19.2.3/",

    "firebase/": "https://esm.sh/firebase@^12.7.0/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "xlsx": "https://esm.sh/xlsx@^0.18.5",
    "jspdf": "https://esm.sh/jspdf@^3.0.4",
    "jsbarcode": "https://esm.sh/jsbarcode@^3.12.1",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "@vercel/node": "https://esm.sh/@vercel/node@^5.5.16",
    "mssql": "https://esm.sh/mssql@^12.2.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "@capacitor/cli": "https://esm.sh/@capacitor/cli@^8.0.0"
  }
}

</head>

    <div id="root"></div>

</html>
