    <style>
        :root {
            --background-start-rgb: 243 244 246; /* gray-100 */
            --background-end-rgb: 229 231 235; /* gray-200 */
            --surface-primary-rgb: 255 255 255; /* white */
            --surface-secondary-rgb: 249 250 251; /* gray-50 */
            --primary-rgb: 59 130 246; /* blue-500 */
            --primary-dark-rgb: 37 99 235; /* blue-600 */
            --primary-light-rgb: 219 234 254; /* blue-100 */
            --text-primary-rgb: 17 24 39; /* gray-900 */
            --text-secondary-rgb: 75 85 99; /* gray-500 */
            --border-color-rgb: 229 231 235; /* gray-200 */
            --shadow-color-rgb: 110 120 140;
            --danger-rgb: 239 68 68; /* red-500 */
            --success-rgb: 34 197 94; /* green-500 */
            --header-height: calc(3.5rem + env(safe-area-inset-top));
        }

        html, body, #root {
            height: 100%;
            overflow: hidden;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        
        body {
            background-color: rgb(var(--surface-secondary-rgb));
        }

        input, textarea, [contenteditable="true"] {
            -webkit-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        /* Modern Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(var(--text-secondary-rgb), 0.3); border-radius: 6px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(var(--text-secondary-rgb), 0.5); }

        .fixed-filter { flex-shrink: 0; }
        .scrollable-content { 
            flex-grow: 1; 
            overflow-y: auto; 
            scrollbar-gutter: stable;
        }

        /* Style for Window Controls Overlay & iOS Safe Area */
        #app-header {
            -webkit-app-region: drag;
            padding-top: env(safe-area-inset-top);
            height: var(--header-height);
        }
        #app-header button, #app-header a, #app-header input, #app-header select {
            -webkit-app-region: no-drag;
        }
        
        /* Custom animations */
        @keyframes fadeInDown {
          from { opacity: 0; transform: translateY(-12px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-down {
          animation: fadeInDown 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
          will-change: transform, opacity;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            will-change: transform, opacity;
        }
        
        /* Bouncy card entrance animation */
        @keyframes card-enter {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-card-enter {
            animation: card-enter 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            will-change: transform, opacity;
        }

        /* Sale Ribbon Style */
        .sale-ribbon {
            position: absolute;
            top: 12px;
            right: -34px;
            transform: rotate(45deg);
            background-color: rgb(239 68 68); /* red-500 */
            color: white;
            padding: 2px 32px;
            font-size: 10px;
            font-weight: 700;
            line-height: 1.5;
            text-align: center;
            text-transform: uppercase;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1;
            letter-spacing: 0.05em;
        }
        
        /* Drag and Drop styles */
        .dragging {
            opacity: 0.5;
            background: rgb(var(--primary-light-rgb));
            box-shadow: 0 10px 15px -3px rgba(var(--shadow-color-rgb), 0.1), 0 4px 6px -2px rgba(var(--shadow-color-rgb), 0.05);
            transform: scale(1.02);
        }
        .drag-over-placeholder {
            height: 60px;
            background-color: rgba(var(--primary-rgb), 0.08);
            border: 2px dashed rgba(var(--primary-rgb), 0.4);
            border-radius: 0.5rem;
            margin: 4px 0;
            transition: all 0.2s ease-in-out;
        }
    </style>
