
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>발주 관리 앱</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS (XLSX) library for Excel reading -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- jsPDF for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- jsPDF-autotable for PDF tables -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <!-- zxing-js for barcode scanning -->
    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.0/umd/index.min.js"></script>
    <!-- Nanum Gothic font for PDF Korean support -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nanum+Gothic:wght@400;700&display=swap');
        html, body, #root {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', 'Nanum Gothic', sans-serif;
        }
        .main-content {
            height: calc(100% - 9rem); /* Adjust based on header (5rem) and nav (4rem) height */
        }
        /* Custom scrollbar for better mobile experience */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        .fixed-filter { flex-shrink: 0; }
        .scrollable-content { flex-grow: 1; overflow-y: auto; }
        .keyboard-padding {
            padding-bottom: 250px !important;
            transition: padding-bottom 0.2s ease-in-out;
        }
    </style>
<script type="importmap">

    "react": "https://aistudiocdn.com/react@^19.1.1"
  }
}
</script>
</head>
<body class="bg-slate-100 antialiased">
    <div id="root" class="h-full w-full max-w-lg mx-auto bg-white shadow-lg"></div>
</body>
</html>
